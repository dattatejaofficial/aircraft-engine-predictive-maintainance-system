data_ingestion_details:
  train_features_table_name: train_features
  test_features_table_name: test_features
  test_targets_table_name: test_targets

  data_ingestion_dir : data_ingestion
  ingested_data_dir : data

  ingested_train_data_path : train_data.csv
  ingested_test_data_path : test_data.csv
  ingested_test_target_path : test_data_target.csv

  exclude_columns : ['created_at']

data_validation_details:
  data_schema_dir: data_schema
  data_schema_path: ingested_data_schema.yaml
  
  data_validation_dir: data_validation
  validated_data_dir: data
  validation_report_dir: reports

  validated_train_features_path: validated_train_features.csv
  validated_test_features_path: validated_test_features.csv
  validated_test_targets_path: validated_test_targets.csv
  validation_report_path: ingested_data_validation_report.json

model_training_details:
  model_training_dir: model_training
  evaluation_report_dir: evaluation
  evaluation_report_path: evaluation_report.json

  sequence_length: 30
  failure_threshold: 30

  random_state: 42

  engine_id_column: engine_id
  
  mlflow:
    experiment_name: Aircraft Engine RUL Prediction
    registered_model_name: Hybrid RUL Model

  lstm:
    features: [sensor_2_norm, sensor_3_norm, sensor_4_norm, sensor_7_norm, sensor_8_norm, sensor_9_norm, sensor_11_norm, sensor_12_norm, sensor_13_norm, sensor_14_norm, sensor_15_norm, sensor_17_norm, sensor_20_norm, sensor_21_norm, health_index, cycle_count_norm]
    target: RUL_scaled
    input_size: 16
    hidden_size: 64
    num_layers: 2
    dropout: 0.2

    batch_size: 64
    learning_rate: 0.001
    epochs: 20
  
  xgboost:
    exclude_columns: [engine_id, cycle, RUL_capped, RUL_scaled, cycle_count_norm, failure_window]
    target: failure_window
    validation_size: 0.2
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    eval_metric: logloss

  feature_store:
    feature_scaler_path: feature_store/min_max_scaler.pkl
    target_scaler_path: feature_store/standard_scaler.pkl